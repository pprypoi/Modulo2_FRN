<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Escolar — Inicio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/home/css/home.css">
</head>
<body>
    <nav class="navbar navbar-dark home-navbar">
        <div class="container">
            <span class="navbar-brand mb-0 h1">Sistema Escolar</span>
            <div class="d-flex align-items-center gap-3 text-white">
                <span>{{ request.user.get_full_name|default:request.user.username }}</span>
                <form action="{% url 'logout' %}" method="post" class="mb-0">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-outline-light btn-sm">Cerrar sesión</button>
                </form>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h2 class="mb-4">Módulos</h2>
        <div class="row g-4">
            {% for modulo in modulos %}
            <div class="col-md-6 col-lg-4">
                <a href="{% url modulo.url %}" class="text-decoration-none">
                    <div class="card h-100 module-card">
                        <div class="card-body">
                            <h5 class="card-title">{{ modulo.nombre }}</h5>
                            <p class="card-text text-muted">{{ modulo.descripcion }}</p>
                        </div>
                    </div>
                </a>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
